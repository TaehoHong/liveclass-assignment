version: '3.8'

services:
  liveclass_server:
    container_name: liveclass_server
    build:
      context: ..
      dockerfile: docker/Dockerfile

    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/liveclass

    ports:
      - "8080:8080"

    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: liveclass_db
    image: mysql:latest

    environment:
      MYSQL_DATABASE: liveclass
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: liveclass
      MYSQL_PASSWORD: liveclass

    ports:
      - "3306:3306"

    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent" ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

